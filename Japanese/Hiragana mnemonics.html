<style>
  .mnemo-character {
    display: flex;
    flex-direction: row;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #0f0f0f;
  }

  .chart-wrapper {
    background: #111;
    color: #e0e0e0;
    font-family: var(--font-sans, sans-serif);
    padding: 1.5rem 1rem 2rem;
  }

  .chart-title {
    text-align: center;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: #f0f0f0;
    margin-bottom: 2px;
  }

  .chart-sub {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #888;
    margin-bottom: 1.5rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
  }

  .cell {
    background: #1a1a1a;
    border: 0.5px solid #333;
    border-radius: 6px;
    padding: 6px 4px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }

  .cell.empty {
    background: transparent;
    border-color: transparent;
  }

  .row-label {
    position: absolute;
    top: 4px;
    right: 5px;
    font-size: 9px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.05em;
  }

  .img-placeholder {
    width: 44px;
    height: 36px;
    background: #252525;
    border: 0.5px dashed #444;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: #555;
    text-align: center;
    line-height: 1.2;
    flex-shrink: 0;

    img {
      width: 100%;
    }
  }

  .hiragana {
    font-size: 32px;
    line-height: 1;
    color: #f0f0f0;
    font-weight: 400;
  }

  .mnemonic {
    font-size: 8.5px;
    color: #777;
    text-align: center;
    line-height: 1.3;
    max-width: 72px;
  }

  .row-extra {
    margin-top: 1.5rem;
    display: flex;
    gap: 6px;
  }

  .row-wa-n {
    display: flex;
    gap: 6px;
    margin-top: 6px;
    align-items: flex-start;
  }

  .n-spacer {
    flex: 1;
  }

  .footer {
    text-align: center;
    font-size: 10px;
    color: #555;
    margin-top: 1.5rem;
    letter-spacing: 0.1em;
  }

  .section-label {
    grid-column: 1 / -1;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.1em;
    padding: 4px 0 0;
  }
</style>

<div class="chart-wrapper">
  <h2 class="chart-title">HIRAGANA MNEMONIC CHART</h2>
  <p class="chart-sub">· · · · · BY TOFUGU.COM · · · · ·</p>
  <p class="chart-sub">Set <code>Operating Mode</code> = <code>Unrestricted Mode</code> in HTML Reader extension
    settings</p>

  <div class="grid" id="mainGrid"></div>

  <div class="row-wa-n" id="waRow"></div>

</div>

<script>
  const rows = [
    {
      vowel: "A", chars: [
        { h: "あ", r: "A", m: "Find the capital A in あ" },
        { h: "か", r: "KA", m: 'Someone doing the "can-can" KA dance' },
        { h: "さ", r: "SA", m: 'A weird SA sign' },
        { h: "た", r: "TA", m: "This kana looks like a TA" },
        { h: "な", r: "NA", m: "The naughty NA nun praying before a cross" },
        { h: "は", r: "HA", m: "This kana looks like a HA" },
        { h: "ま", r: "MA", m: "Imagine your MA looking like this. Aghh!" },
        { h: "ら", r: "RA", m: "The rapper is rapping at the DJ table" },
        { h: "や", r: "YA", m: "A yak" },
        { h: "", r: "", m: "" },
      ]
    },
    {
      vowel: "I", chars: [
        { h: "い", r: "I", m: "A couple of eels (i)" },
        { h: "き", r: "KI", m: "A key (KI)" },
        { h: "し", r: "SHI", m: "A poor seal (SHI)" },
        { h: "ち", r: "CHI", m: "Where's the chin?" },
        { h: "に", r: "NI", m: "A needle (NI) pulling a thread" },
        { h: "ひ", r: "HI", m: "HE (HI) has a big nose" },
        { h: "み", r: "MI", m: "Who just turned 21? ME (MI)!" },
        { h: "り", r: "RI", m: "The reeds (RI) are swaying in the wind" },
        { h: "", r: "", m: "" },
        { h: "", r: "", m: "" },
      ]
    },
    {
      vowel: "U", chars: [
        { h: "う", r: "U", m: "Find the U in the う" },
        { h: "く", r: "KU", m: 'The mouth of a cuckoo bird saying "KU, KU, KU"' },
        { h: "す", r: "SU", m: "A swing (SU) doing a throw — throwing that poor kid off of it" },
        { h: "つ", r: "TSU", m: "Two (TSU) fish" },
        { h: "ぬ", r: "NU", m: "Some noodles (NU)" },
        { h: "ふ", r: "FU", m: "A fu-reaky hula dancer" },
        { h: "む", r: "MU", m: '"Moooooo" (MU), says the cow' },
        { h: "る", r: "RU", m: "る is a crazier route (RU)" },
        { h: "ゆ", r: "YU", m: "A unique (YU) looking fish" },
        { h: "", r: "", m: "" },
      ]
    },
    {
      vowel: "E", chars: [
        { h: "え", r: "E", m: "An exotic bird" },
        { h: "け", r: "KE", m: "A keg" },
        { h: "せ", r: "SE", m: "How sexy is that tooth?" },
        { h: "て", r: "TE", m: "Ten" },
        { h: "ね", r: "NE", m: "Neko is Japanese for 'cat' — it's Nelly the Neko!" },
        { h: "へ", r: "HE", m: "The famous mountain Mt. Saint Helens" },
        { h: "め", r: "ME", m: "め ME is Japanese for 'eye'" },
        { h: "れ", r: "RE", m: "This guy is retching up his dinner" },
        { h: "", r: "", m: "" },
        { h: "", r: "", m: "" },
      ]
    },
    {
      vowel: "O", chars: [
        { h: "お", r: "O", m: "Two letter O symbols" },
        { h: "こ", r: "KO", m: "KO is a couple of co-habitation (KO) worms" },
        { h: "そ", r: "SO", m: "A songbird" },
        { h: "と", r: "TO", m: "A toe with a little splinter on it" },
        { h: "の", r: "NO", m: "A pig nose" },
        { h: "ほ", r: "HO", m: "A mutated Santa Claus uttering 'HO HO HO'" },
        { h: "も", r: "MO", m: "Catch more fish so add more worms to your hook" },
        { h: "ろ", r: "RO", m: "A plain old road especially when compared to る" },
        { h: "よ", r: "YO", m: 'The hitchhiker is yelling "YO YO!"' },
        { h: "", r: "", m: "" },
      ]
    },
  ];

  const waChars = [
    { h: "わ", r: "WA", m: "A wasp flying straight up" },
    { h: "を", r: "WO", m: "Whoa! (WO) there's a boomerang in his mouth" },
  ];
  const nChar = { h: "ん", r: "N", m: "This kana looks just like the lowercase n in English" };

  function makeCell ( char ) {
    if ( !char.h ) return `<div class="cell empty"></div>`;
    return `
    <div class="cell">
      <span class="row-label">${ char.r }</span>
      <div class="mnemo-character">
        <div class="img-placeholder">
          <img src="mnemonicsImgs/${ char.r }.png" alt="${ char.r } mnemonic image">
        </div>
        <span class="hiragana">${ char.h }</span>
      </div>
      <span class="mnemonic">${ char.m }</span>
    </div>`;
  }

  const grid = document.getElementById( "mainGrid" );
  rows.forEach( row => {
    row.chars.forEach( c => {
      grid.innerHTML += makeCell( c );
    } );
  } );

  const waRow = document.getElementById( "waRow" );
  waChars.forEach( c => { waRow.innerHTML += makeCell( c ); } );
  waRow.innerHTML += `<div class="n-spacer"></div>`;
  waRow.innerHTML += makeCell( nChar );
</script>
